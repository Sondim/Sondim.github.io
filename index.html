<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondim | Founder Coaching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        
        @keyframes shimmer { 100% { left: 150%; } }
        .animate-shimmer { animation: shimmer 1.8s infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 5s ease-in-out infinite; }

        /* Modal Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* --- THE BOUNCE PHYSICS --- */
        @keyframes bounce {
            0% { translate: 0 0; }
            5% { translate: 0 0; }
            100% { translate: 0 var(--bounce-height, -100px); }
        }
        
        @keyframes squash {
            0% { scale: var(--squash-ratio) calc(1 / var(--stretch-ratio)); }
            10% { scale: calc(1 / var(--squash-ratio)) var(--stretch-ratio); }
            100% { scale: 1 1; }
        }

        .ball {
            --curve: cubic-bezier(0.123, 0.5, 0.5, 1);
            --stretch-ratio: 1.25;
            --squash-ratio: 1.5;
            --bounce-height: -100px;
            
            width: 50px;
            height: 50px;
            background: #eab308; 
            border-radius: 50%;
            
            animation:
                squash 800ms linear infinite,
                bounce 400ms var(--curve) infinite alternate;
            
            transform-origin: center bottom;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3), 0 0 20px rgba(234, 179, 8, 0.5);
        }
        
        /* Slider Styling - Replaced 'theme' calls with hex for CDN compatibility */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 8px; background: #27272a; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #3b82f6; margin-top: -8px; cursor: pointer;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans selection:bg-blue-500/30 overflow-x-hidden">

    <nav class="sticky top-0 z-40 bg-zinc-950/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-4xl mx-auto px-6 py-4 md:py-6 flex justify-between items-center">
            <div class="text-xl font-black tracking-[0.2em] text-white flex gap-1 group cursor-default">
                <span>S</span><span>O</span><span class="text-blue-500">N</span><span>D</span><span>I</span><span>M</span>
            </div>
            <div class="flex gap-6 items-center">
                <a href="#bounce-test" class="hidden sm:block text-xs font-mono uppercase tracking-widest text-zinc-400 hover:text-purple-400 transition-colors">[ Bounce_Test ]</a>
                <a href="#book" class="text-xs font-mono uppercase tracking-widest text-zinc-400 hover:text-blue-400 transition-colors">[ Book_Now ]</a>
            </div>
        </div>
    </nav>

    <section class="max-w-4xl mx-auto px-6 py-12 md:py-24 flex flex-col md:flex-row items-center gap-12 relative z-10">
        <div class="absolute -top-24 -left-24 w-72 h-72 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="group relative w-56 h-56 md:w-72 md:h-72 flex-shrink-0 animate-float">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-2xl blur opacity-20 transition duration-500"></div>
            <div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl bg-zinc-900 border border-white/10">
                <img src="beard.png" alt="Magnus" class="w-full h-full object-cover">
            </div>
        </div>
        <div class="flex-1 text-center md:text-left z-10">
            <h1 class="text-4xl md:text-6xl font-black mb-6 text-white leading-[0.9] tracking-tighter">Where <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">joy</span> meets ambition.</h1>
            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start flex-wrap mt-8">
                <a href="#book" class="px-6 py-4 bg-white text-black rounded-xl font-black shadow-[0_5px_0_0_#d4d4d8] active:translate-y-1 transition-all">Book Session</a>
                <button onclick="openAssessment()" class="px-6 py-4 bg-blue-600/20 border border-blue-500/50 text-blue-400 rounded-xl font-bold shadow-[0_5px_0_0_#1e3a8a] active:translate-y-1 transition-all">Free Assessment</button>
                <button onclick="openTopicPicker()" class="px-6 py-4 bg-purple-600/20 border border-purple-500/50 text-purple-400 rounded-xl font-bold shadow-[0_5px_0_0_#4c1d95] active:translate-y-1 transition-all">What to work on?</button>
            </div>
        </div>
    </section>

    <section id="bounce-test" class="max-w-3xl mx-auto px-6 py-24 text-center border-t border-white/5">
        <h2 class="text-4xl md:text-5xl font-black text-white mb-6">How bouncy do you feel?</h2>
        <div class="h-64 flex items-end justify-center pb-[2px] border-b-2 border-zinc-700 w-full max-w-sm mx-auto mb-10 relative">
            <div class="ball" id="interactive-ball"></div>
        </div>
        <div class="max-w-sm mx-auto mb-10">
            <input type="range" min="1" max="2" step="0.01" value="1.5" id="bounce-slider" class="w-full" oninput="updateBouncePhysics()">
        </div>
        <button onclick="confirmBounce()" class="px-10 py-5 bg-white text-black rounded-xl font-black text-lg shadow-[0_5px_0_0_#d4d4d8] active:translate-y-1">Confirm Physics</button>
    </section>

    <div id="assessment-modal" class="fixed inset-0 z-50 hidden bg-zinc-950/95 backdrop-blur-md overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center px-6 py-20 w-full relative">
            <div class="w-full max-w-3xl mx-auto relative bg-zinc-900 border border-white/10 p-8 md:p-12 rounded-3xl shadow-2xl">
                <button onclick="closeModals()" class="absolute top-4 right-4 text-zinc-500 hover:text-white p-2 z-50">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>

                <div id="state-quiz" class="hidden">
                    <div class="mb-8 flex justify-between text-xs font-mono text-zinc-500 uppercase tracking-widest">
                        <span id="question-counter">Question 1 of 3</span>
                    </div>
                    <h2 id="question-text" class="text-3xl md:text-4xl font-bold text-white mb-10 leading-tight">Question?</h2>
                    <div id="answers-container" class="flex flex-col gap-4"></div>
                </div>

                <div id="state-results" class="text-center hidden">
                    <div id="result-label" class="text-blue-500 font-mono text-sm uppercase tracking-[0.3em] mb-4 font-bold">Your Archetype</div>
                    <h2 id="result-title" class="text-4xl md:text-6xl font-black text-white mb-6">Result Title</h2>
                    <div class="p-6 md:p-8 rounded-2xl bg-zinc-950/50 border border-white/5 text-left mb-10">
                        <p id="result-description" class="text-lg text-zinc-300 leading-relaxed"></p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                        <a id="result-download-btn" href="#" download class="px-8 py-4 bg-blue-600 text-white rounded-xl font-black text-lg shadow-[0_5px_0_0_#1e3a8a] active:translate-y-1 transition-all">Download Guide</a>
                        <button onclick="bookFromModal()" class="px-8 py-4 bg-zinc-800 text-white rounded-xl font-bold shadow-[0_5px_0_0_#27272a] active:translate-y-1 transition-all">Book Free Teardown</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section id="book" class="max-w-4xl mx-auto px-6 py-24 text-center">
        <div class="bg-white rounded-3xl overflow-hidden min-h-[700px] border-4 border-white">
            <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3Eoq_4KUvBNMyPqUt0U2YPmV1BrPI7w8sx-0h1uALKplFu_uigELHtjWVFKe-8-oqYK1a9DCrM?gv=true" style="border: 0" width="100%" height="700" frameborder="0"></iframe>
        </div>
    </section>

    <script>
        function updateBouncePhysics() {
            const val = parseFloat(document.getElementById('bounce-slider').value);
            const ball = document.getElementById('interactive-ball');
            const stretch = 1 + ((val - 1) * 0.5); 
            ball.style.setProperty('--squash-ratio', val);
            ball.style.setProperty('--stretch-ratio', stretch);
            ball.style.setProperty('--bounce-height', '-120px'); 
        }

        const bounceResultsData = {
            rigid: { title: "The Rigid Developer", desc: "You are holding everything tightly together. The 'bounce' is gone. Flexibility is your missing key.", pdfFile: "survival-guide.pdf", pdfName: "Rigid_Dev_Plan", btnText: "Download Guide" },
            bouncy: { title: "The Grounded Developer", desc: "You have a solid equilibrium. You squash to absorb impacts but always return to center.", pdfFile: "survival-guide.pdf", pdfName: "Grounded_Dev_Plan", btnText: "Download Guide" },
            loose: { title: "The Loose Developer", desc: "You adapt quickly, but your energy is flying all over the place. We need to ground you.", pdfFile: "survival-guide.pdf", pdfName: "Loose_Dev_Plan", btnText: "Download Guide" }
        };

        const assessmentModal = document.getElementById('assessment-modal');
        function closeModals() {
            document.body.style.overflow = 'auto'; 
            assessmentModal.classList.add('hidden');
        }

        function triggerCustomResult(data, label) {
            document.getElementById('result-label').innerText = label;
            document.getElementById('result-title').innerText = data.title;
            document.getElementById('result-description').innerText = data.desc;
            document.getElementById('result-download-btn').href = data.pdfFile;
            assessmentModal.classList.remove('hidden');
            document.getElementById('state-quiz').classList.add('hidden');
            document.getElementById('state-results').classList.remove('hidden');
        }

        function confirmBounce() {
            const val = parseFloat(document.getElementById('bounce-slider').value);
            let key = val <= 1.25 ? 'rigid' : val >= 1.75 ? 'loose' : 'bouncy';
            triggerCustomResult(bounceResultsData[key], "Physics Audit Complete");
        }

        function bookFromModal() { closeModals(); document.getElementById('book').scrollIntoView(); }
        updateBouncePhysics();
    </script>
</body>
</html>
